name: VoiceTyper
options:
  bundleIdPrefix: com.voicetyper
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.voicetyper.app
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    INFOPLIST_FILE: VoiceTyper/Resources/Info.plist
    SWIFT_OBJC_BRIDGING_HEADER: VoiceTyper/Bridge/VoiceTyper-Bridging-Header.h
    CODE_SIGN_ENTITLEMENTS: VoiceTyper/Resources/VoiceTyper.entitlements
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_IDENTITY: "-"
    PRODUCT_NAME: VoiceTyper
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    COMBINE_HIDPI_IMAGES: YES
    LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
    # whisper.cpp build settings
    OTHER_CFLAGS: "$(inherited) -DGGML_USE_METAL=1 -DWHISPER_USE_COREML=0 -DGGML_USE_ACCELERATE=1"
    OTHER_CPLUSPLUSFLAGS: "$(inherited) -DGGML_USE_METAL=1 -DWHISPER_USE_COREML=0 -DGGML_USE_ACCELERATE=1 -std=c++17"
    CLANG_CXX_LANGUAGE_STANDARD: "c++17"
    GCC_PREPROCESSOR_DEFINITIONS: "$(inherited) GGML_USE_METAL=1 GGML_USE_ACCELERATE=1"
    # LSUIElement - no dock icon
    GENERATE_INFOPLIST_FILE: NO

targets:
  VoiceTyper:
    type: application
    platform: macOS
    sources:
      - path: VoiceTyper
        excludes:
          - "**/.DS_Store"
          - "whisper.cpp"
    settings:
      base:
        # App Sandbox OFF (required for CGEventTap + Accessibility)
        ENABLE_APP_SANDBOX: NO
        PRODUCT_MODULE_NAME: VoiceTyper
    dependencies: []
    preBuildScripts: []
    frameworks:
      - framework: Metal.framework
        implicit: true
      - framework: Accelerate.framework
        implicit: true
      - framework: AVFoundation.framework
        implicit: true
      - framework: Speech.framework
        implicit: true
      - framework: ApplicationServices.framework
        implicit: true
      - framework: CoreGraphics.framework
        implicit: true
      - framework: AppKit.framework
        implicit: true
      - framework: ServiceManagement.framework
        implicit: true
